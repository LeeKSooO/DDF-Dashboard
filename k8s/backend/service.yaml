apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: ddf-system
  labels:
    app: backend
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: backend
---
# NodePort
apiVersion: v1
kind: Service
metadata:
  name: backend-nodeport
  namespace: ddf-system
  labels:
    app: backend
spec:
  type: NodePort
  ports:
  - port: 8000
    targetPort: 8000
    nodePort: 30800
    protocol: TCP
    name: http
  selector:
    app: backend