apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-deployment
  namespace: ddf-system
  labels:
    app: postgres
spec:
  replicas: 1
  strategy:
    type: Recreate  # Recreate - DB만, 다른 서비스들은 Rolling
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      securityContext:
        fsGroup: 1000
      containers:
      - name: postgres
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
        image: 204572980322.dkr.ecr.ap-northeast-2.amazonaws.com/ddf-postgres:v1 
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_DB
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        - name: TZ
          value: Asia/Seoul
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - doritos_leeks
            - -d
            - doritos_postgres
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - doritos_leeks
            - -d
            - doritos_postgres
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc