apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  namespace: ddf-system
  labels:
    app: nginx
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: nginx
---
# LoadBalancer for external access (API Gateway) - HTTP only
apiVersion: v1
kind: Service
metadata:
  name: nginx-loadbalancer
  namespace: ddf-system
  labels:
    app: nginx
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: nginx