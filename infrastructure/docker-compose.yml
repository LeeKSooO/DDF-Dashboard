# ===============================================
# 운영 환경 Docker Compose
# ===============================================

services:
  # PostgreSQL + TimescaleDB + PostGIS
  postgres:
    build:
      context: ./database
      dockerfile: Dockerfile
    image: ddf-postgres:v1
    container_name: ddf-postgres
    env_file:
      - ../.env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      PGDATA: /home/postgres/pgdata/data
    volumes:
      - ../postgres:/home/postgres/pgdata
      - ./database/init:/docker-entrypoint-initdb.d
      - ./database/migrations:/docker-entrypoint-initdb.d/migrations
    ports:
      - "5432:5432"
    networks:
      - ddf-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ddf_user -d ddf_db"]
      interval: 10s
      timeout: 5s
      retries: 5


  # FastAPI Backend Server
  backend:
    build: ../backend
    image: ddf-backend:v1
    container_name: ddf-backend
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      REDIS_URL: redis://redis:6379
      TZ: Asia/Seoul
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/backend
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ddf-network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload


  # Infrastructure Nginx (API Gateway)
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
      args:
        BUILD_ENV: dev
    image: ddf-nginx:v1
    container_name: ddf-nginx
    environment:
      TZ: Asia/Seoul
    ports:
      - "8080:8080"  # External access point
    depends_on:
      frontend:
        condition: service_healthy
    networks:
      - ddf-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/nginx-health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s


  # Frontend Next.js
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    image: ddf-frontend:v5
    container_name: ddf-frontend
    environment:
      TZ: Asia/Seoul
      NODE_ENV: production
      BACKEND_API_URL: http://backend:8000
      RAG_API_URL: http://rag:8001
      # Stateful 설정
      SESSION_CLEANUP_INTERVAL: 300000  # 5분마다 세션 정리
      MAX_SESSIONS: 1000               # 최대 세션 수
    depends_on:
      backend:
        condition: service_started
      rag:
        condition: service_started
    networks:
      - ddf-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/api/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s


  # RAG API Server
  rag:
    build: ../RAG
    image: ddf-rag:v1
    container_name: ddf-rag
    env_file:
      - ../RAG/.env
      - ../.env
    environment:
      BACKEND_API_URL: http://backend:8000
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      TZ: Asia/Seoul
      # RAG 문서 로딩 제어 환경 변수
      SKIP_INITIAL_DOCUMENT_LOAD: "true"   # 기본값: 초기 문서 로딩 건너뛰기
      FORCE_RELOAD_DOCUMENTS: "false"      # 기본값: 강제 재로딩 비활성화
    ports:
      - "8001:8001"
    volumes:
      - ../RAG/app:/rag/app  # App 코드만 마운트 (for hot reload)
    depends_on:
      backend:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - ddf-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload


  # Redis for caching (optional but recommended)
  redis:
    image: redis:7-alpine
    container_name: ddf-redis
    ports:
      - "6379:6379"
    networks:
      - ddf-network
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data


networks:
  ddf-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: