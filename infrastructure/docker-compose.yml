# ===============================================
# 운영 환경 Docker Compose
# ETL 제외한 모든 운영 서비스
# ===============================================

services:
  # PostgreSQL + TimescaleDB + PostGIS
  postgres:
    build:
      context: ./database
      dockerfile: Dockerfile
    container_name: ddf-postgres
    environment:
      POSTGRES_USER: ddf_user
      POSTGRES_PASSWORD: ddf_password
      POSTGRES_DB: ddf_db
      PGDATA: /home/postgres/pgdata/data
    volumes:
      - ../postgres:/home/postgres/pgdata
      - ./database/init:/docker-entrypoint-initdb.d
      - ./database/migrations:/docker-entrypoint-initdb.d/migrations
    ports:
      - "5432:5432"
    networks:
      - ddf-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ddf_user -d ddf_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend Server
  backend:
    build: ../backend
    container_name: ddf-backend
    environment:
      DATABASE_URL: postgresql://ddf_user:ddf_password@postgres:5432/ddf_db
      TZ: Asia/Seoul
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/backend
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ddf-network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload



  # Infrastructure Nginx (API Gateway)
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
      args:
        BUILD_ENV: dev
    image: ddf-nginx:v1
    container_name: ddf-nginx
    environment:
      TZ: Asia/Seoul
    ports:
      - "8080:8080"  # External access point
    depends_on:
      frontend:
        condition: service_healthy
    networks:
      - ddf-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/nginx-health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Frontend Next.js SSR (Stateful Application Server)
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.ssr
    image: ddf-frontend:v4
    container_name: ddf-frontend
    environment:
      TZ: Asia/Seoul
      NODE_ENV: production
      BACKEND_API_URL: http://backend:8000
      RAG_API_URL: http://rag:8001
      # Stateful 설정
      SESSION_CLEANUP_INTERVAL: 300000  # 5분마다 세션 정리
      MAX_SESSIONS: 1000               # 최대 세션 수
    depends_on:
      backend:
        condition: service_started
      rag:
        condition: service_started
    networks:
      - ddf-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # RAG API Server
  rag:
    build: ../RAG
    container_name: ddf-rag
    env_file:
      - ../.env
    environment:
      BACKEND_API_URL: http://backend:8000
      DATABASE_URL: postgresql://ddf_user:ddf_password@postgres:5432/ddf_db
      TZ: Asia/Seoul
      # RAG 문서 로딩 제어 환경 변수
      SKIP_INITIAL_DOCUMENT_LOAD: "true"   # 기본값: 초기 문서 로딩 건너뛰기
      FORCE_RELOAD_DOCUMENTS: "false"      # 기본값: 강제 재로딩 비활성화
    ports:
      - "8001:8001"
    volumes:
      - ../RAG:/rag
      - ../RAG/data:/rag/data  # Host 디렉토리 직접 마운트
    depends_on:
      backend:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - ddf-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

  # ChromaDB Vector Database  
  chromadb:
    image: chromadb/chroma:latest
    container_name: ddf-chromadb
    environment:
      PERSIST_DIRECTORY: /data
    ports:
      - "8003:8000"  # External access (내부 8000 → 외부 8003)
    volumes:
      - ../RAG/chroma:/data  # ChromaDB 데이터 연결
    networks:
      - ddf-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Redis for caching (optional but recommended)
  redis:
    image: redis:7-alpine
    container_name: ddf-redis
    ports:
      - "6379:6379"
    networks:
      - ddf-network
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data


networks:
  ddf-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: