# ===============================================
# Nginx Proxy Configuration for Docker Compose
# Frontend SSR과 Backend 서비스 프록시 전용
# ===============================================

# PID file location for non-root user
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    # Basic Settings
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    server_tokens off;
    
    # Performance Settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    
    # Buffer Settings
    client_max_body_size 10M;
    client_body_buffer_size 128k;
    
    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    
    # Rate Limiting
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=chat:10m rate=5r/s;
    
    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time '
                    'upstream=$upstream_addr';
    
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;
    
    # Upstream Services
    upstream nextjs_ssr {
        server frontend:3000;  # Next.js SSR 컨테이너
        keepalive 32;
    }
    
    upstream backend_api {
        server backend:8000;       # Backend 컨테이너
        keepalive 16;
    }
    
    upstream rag_api {
        server rag:8001;           # RAG 컨테이너
        keepalive 8;
    }
    
    # Main Proxy Server
    server {
        listen 8080;
        server_name _;
        
        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        
        # Remove sensitive headers
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
        
        # Nginx Health Check (self check)
        location /nginx-health {
            access_log off;
            return 200 "nginx healthy\n";
            add_header Content-Type text/plain;
        }
        
        # Application Health Check (proxy to Next.js)
        location /health {
            access_log off;
            limit_req zone=general burst=10 nodelay;
            
            proxy_pass http://nextjs_ssr/api/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_connect_timeout 5s;
            proxy_send_timeout 5s;
            proxy_read_timeout 5s;
        }
        
        # RAG Chat API (to Next.js SSR for stateful handling)
        location /api/chat {
            limit_req zone=chat burst=10 nodelay;
            
            proxy_pass http://nextjs_ssr/api/chat;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Longer timeout for LLM responses
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Disable buffering for streaming
            proxy_buffering off;
            proxy_cache off;
        }
        
        # Dashboard Tab Metadata API (to Next.js SSR for state management)
        location /api/dashboard/ {
            limit_req zone=api burst=15 nodelay;
            
            proxy_pass http://nextjs_ssr/api/dashboard/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Backend API (Direct to Backend - stateless operations)
        location /api/v1/ {
            limit_req zone=api burst=20 nodelay;
            
            proxy_pass http://backend_api/api/v1/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }
        
        # RAG API (Direct to RAG Service) - Must come before /api/
        location /api/rag/ {
            limit_req zone=chat burst=10 nodelay;
            
            proxy_pass http://rag_api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Longer timeout for LLM responses
            proxy_connect_timeout 15s;
            proxy_send_timeout 90s;
            proxy_read_timeout 90s;
            
            # Disable buffering for streaming
            proxy_buffering off;
            proxy_cache off;
        }
        
        # All other API routes to Next.js SSR
        location /api/ {
            limit_req zone=api burst=15 nodelay;
            
            proxy_pass http://nextjs_ssr/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Static Assets (cache and fallback to Next.js)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header X-Cache-Status "NGINX-CACHE";
            
            proxy_pass http://nextjs_ssr;
            proxy_set_header Host $host;
        }
        
        # All other requests to Next.js SSR (pages, SSR)
        location / {
            limit_req zone=general burst=20 nodelay;
            
            proxy_pass http://nextjs_ssr;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # SSR timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }
        
        # Security: Block sensitive files
        location ~ /\.(git|env|htaccess) {
            deny all;
            return 404;
        }
        
        # Error pages
        error_page 404 502 503 504 /error;
        location = /error {
            proxy_pass http://nextjs_ssr/404;
            internal;
        }
    }
}