# ===============================================
# Nginx + Next.js SSR Microservice Configuration
# RAG 시스템과 보안을 고려한 설정
# ===============================================

# PID file location for non-root user
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    # Basic Settings
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Hide nginx version
    server_tokens off;
    
    # Performance Settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    
    # Buffer Settings
    client_body_buffer_size 128k;
    client_max_body_size 10M;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 4k;
    
    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/woff2;
    
    # Rate Limiting Zones
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=chat:10m rate=5r/s;
    
    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';
    
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;
    
    # Upstream for Next.js
    upstream nextjs {
        server frontend-service:3000;  # K8s service name
        keepalive 32;
    }
    
    # Upstream for Backend Service (for direct proxy)
    upstream backend {
        server backend-service:8000;  # K8s service name
        keepalive 16;
    }
    
    # Upstream for RAG Service (for direct proxy)
    upstream rag {
        server rag-service:8001;      # K8s service name
        keepalive 8;
    }
    
    # Main Server Configuration
    server {
        listen 8080;
        server_name _;
        
        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
        
        # Content Security Policy (adjust for your needs)
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' ws: wss:;" always;
        
        # Remove sensitive headers
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
        
        # Nginx Health Check (self check)
        location /nginx-health {
            access_log off;
            return 200 "nginx healthy\n";
            add_header Content-Type text/plain;
        }
        
        # Application Health Check (proxy to Next.js)
        location /health {
            access_log off;
            limit_req zone=general burst=10 nodelay;
            
            proxy_pass http://nextjs/api/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_connect_timeout 5s;
            proxy_send_timeout 5s;
            proxy_read_timeout 5s;
        }
        
        # RAG Chat API (Rate Limited)
        location /api/chat {
            limit_req zone=chat burst=10 nodelay;
            
            proxy_pass http://nextjs/api/chat;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Longer timeout for LLM responses
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Disable buffering for streaming responses
            proxy_buffering off;
            proxy_cache off;
        }
        
        # Dashboard Tab Metadata API (to Next.js for state management)
        location /api/dashboard/ {
            limit_req zone=api burst=15 nodelay;
            
            proxy_pass http://nextjs/api/dashboard/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # RAG API Proxy (Direct to RAG Service)
        location /api/rag/ {
            limit_req zone=chat burst=10 nodelay;
            
            # Proxy directly to RAG service
            proxy_pass http://rag/;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Longer timeout for LLM responses
            proxy_connect_timeout 15s;
            proxy_send_timeout 90s;
            proxy_read_timeout 90s;
            
            # Disable buffering for streaming responses
            proxy_buffering off;
            proxy_cache off;
        }
        
        # Backend API Proxy (Direct to Backend Service)
        location /api/v1/ {
            limit_req zone=api burst=20 nodelay;
            
            # Proxy directly to backend service
            proxy_pass http://backend/api/v1/;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }
        
        # All other API routes to Next.js
        location /api/ {
            limit_req zone=api burst=15 nodelay;
            
            proxy_pass http://nextjs/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }
        
        # Static Assets (served by Nginx directly for performance)
        location ~* ^/(_next/static|favicon\.ico|robots\.txt|sitemap\.xml) {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Cache-Status "NGINX-STATIC";
            
            # Try nginx first, fallback to Next.js
            try_files $uri @nextjs;
        }
        
        # Images and media files
        location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|avif|css|js|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public";
            add_header X-Cache-Status "NGINX-MEDIA";
            
            try_files $uri @nextjs;
        }
        
        # All other requests to Next.js (SSR)
        location / {
            limit_req zone=general burst=20 nodelay;
            
            proxy_pass http://nextjs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # SSR timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            
            # Enable caching for SSR pages
            proxy_cache_bypass $http_cache_control;
            add_header X-Cache-Status $upstream_cache_status always;
        }
        
        # Fallback for static files
        location @nextjs {
            proxy_pass http://nextjs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Security: Block access to sensitive files
        location ~ /\.(git|env|htaccess|htpasswd) {
            deny all;
            return 404;
        }
        
        location ~ /(config|\.env|package\.json|docker) {
            deny all;
            return 404;
        }
        
        # Custom error pages
        error_page 404 /404;
        error_page 500 502 503 504 /500;
        
        # Additional security headers for error pages
        location = /404 {
            proxy_pass http://nextjs/404;
            add_header X-Error-Type "404" always;
        }
        
        location = /500 {
            proxy_pass http://nextjs/500;
            add_header X-Error-Type "5xx" always;
        }
    }
}